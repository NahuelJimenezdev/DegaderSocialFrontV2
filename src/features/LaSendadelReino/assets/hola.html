<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Cuerpo del teléfono -->
    <rect x="32" y="15" width="36" height="70" rx="6" stroke="white" stroke-width="4" transform="rotate(-45 50 50)" />
  
    <!-- Detalle del altavoz/notch -->
    <line x1="46" y1="24" x2="54" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"
      transform="rotate(-45 50 50)" />
  
    <!-- Flecha superior -->
    <path d="M 25 40 C 25 20, 45 15, 60 20" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 52 20 L 62 20 L 62 30" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
      fill="none" />
  
    <!-- Flecha inferior -->
    <path d="M 75 60 C 75 80, 55 85, 40 80" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 48 80 L 38 80 L 38 70" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
      fill="none" />
  </svg>
</body>
</html>
